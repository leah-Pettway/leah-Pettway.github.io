# ===== SITE SETTINGS =====
title: "Your Name"                          # <-- replace
title_separator: "-"
name: "Your Name"                           # <-- replace
description: "Portfolio of [Your Field] research and applied projects"   # <-- replace
url: "https://yourusername.github.io"       # <-- replace with your actual GitHub Pages URL
baseurl: ""
locale: "en-US"

# ===== THEME =====
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"            # options: air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise

# ===== BUILD SETTINGS =====
markdown: kramdown
highlighter: rouge
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

# ===== AUTHOR (shows in sidebar) =====
author:
  name: "Your Name"                         # <-- replace
  avatar: "/assets/images/headshot.jpg"     # <-- add a photo here, or delete this line to skip
  bio: "One-line bio that bridges research + applied interests"   # <-- replace
  location: "City, Country"                 # <-- replace
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:you@email.com"           # <-- replace
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/yourprofile"   # <-- replace
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"       # <-- replace
    - label: "Google Scholar"                # delete if not applicable
      icon: "fas fa-fw fa-graduation-cap"
      url: "https://scholar.google.com/citations?user=XXXX"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/yourusername"

# ===== COLLECTIONS (this is what makes /projects/ work) =====
collections:
  projects:
    output: true
    permalink: /projects/:path/

# ===== DEFAULTS =====
defaults:
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

  # _projects collection
  - scope:
      path: ""
      type: projects
    values:
      layout: single
      author_profile: true
      share: true
      related: true

  # posts (optional, in case you add a blog later)
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
